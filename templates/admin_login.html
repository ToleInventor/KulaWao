<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>Admin Login - Atlas Capture</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
<script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  min-height: 100vh;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #4facfe 75%, #00f2fe 100%);
  background-size: 400% 400%;
  animation: gradientShift 15s ease infinite;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  position: relative;
  overflow: hidden;
}

@keyframes gradientShift {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* Animated particles */
.particle {
  position: absolute;
  width: 4px;
  height: 4px;
  background: rgba(255, 255, 255, 0.6);
  border-radius: 50%;
  pointer-events: none;
  animation: floatParticle 20s infinite linear;
}

@keyframes floatParticle {
  0% {
    transform: translateY(100vh) translateX(0);
    opacity: 0;
  }
  10% {
    opacity: 1;
  }
  90% {
    opacity: 1;
  }
  100% {
    transform: translateY(-100vh) translateX(100px);
    opacity: 0;
  }
}

/* Glassmorphism card */
.glass-card {
  background: rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(20px);
  border-radius: 32px;
  border: 1px solid rgba(255, 255, 255, 0.3);
  box-shadow: 0 25px 45px rgba(0, 0, 0, 0.1), 0 0 20px rgba(255, 255, 255, 0.1);
  padding: 48px 40px;
  width: 100%;
  max-width: 480px;
  position: relative;
  z-index: 2;
  animation: slideUp 0.6s ease-out;
}

@keyframes slideUp {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* Logo section */
.logo-section {
  text-align: center;
  margin-bottom: 32px;
}

.logo-icon {
  width: 80px;
  height: 80px;
  background: rgba(255, 255, 255, 0.2);
  backdrop-filter: blur(10px);
  border-radius: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 20px;
  border: 1px solid rgba(255, 255, 255, 0.3);
  box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
}

.logo-icon img {
  width: 50px;
  height: 50px;
  border-radius: 50%;
}

.logo-section h1 {
  font-size: 28px;
  font-weight: 700;
  color: white;
  margin-bottom: 8px;
  text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
}

.logo-section p {
  color: rgba(255, 255, 255, 0.8);
  font-size: 14px;
}

/* Form styles */
.form-group {
  margin-bottom: 24px;
}

.input-wrapper {
  position: relative;
  display: flex;
  align-items: center;
}

.input-icon {
  position: absolute;
  left: 18px;
  color: rgba(255, 255, 255, 0.7);
  font-size: 20px;
  pointer-events: none;
  transition: all 0.3s ease;
}

.input-field {
  width: 100%;
  padding: 16px 16px 16px 52px;
  background: rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255, 255, 255, 0.3);
  border-radius: 20px;
  font-size: 16px;
  color: white;
  transition: all 0.3s ease;
  font-weight: 500;
}

.input-field::placeholder {
  color: rgba(255, 255, 255, 0.6);
}

.input-field:focus {
  outline: none;
  background: rgba(255, 255, 255, 0.25);
  border-color: rgba(255, 255, 255, 0.5);
  box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
}

.input-field:focus + .input-icon {
  color: white;
  transform: scale(1.1);
}

/* Toggle password button */
.toggle-password {
  position: absolute;
  right: 18px;
  background: none;
  border: none;
  color: rgba(255, 255, 255, 0.7);
  cursor: pointer;
  padding: 0;
  font-size: 20px;
  display: flex;
  align-items: center;
  transition: all 0.3s ease;
}

.toggle-password:hover {
  color: white;
  transform: scale(1.1);
}

/* Login button */
.login-btn {
  width: 100%;
  padding: 16px;
  background: rgba(255, 255, 255, 0.9);
  backdrop-filter: blur(10px);
  border: none;
  border-radius: 20px;
  font-size: 16px;
  font-weight: 700;
  color: #667eea;
  cursor: pointer;
  transition: all 0.3s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin-top: 8px;
  position: relative;
  overflow: hidden;
}

.login-btn::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
  transition: left 0.5s;
}

.login-btn:hover::before {
  left: 100%;
}

.login-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
  background: white;
}

.login-btn:active {
  transform: translateY(0);
}

.login-btn:disabled {
  opacity: 0.7;
  cursor: not-allowed;
}

.button-loading {
  display: inline-flex;
  align-items: center;
  gap: 8px;
}

.spinner {
  width: 18px;
  height: 18px;
  border: 2px solid rgba(102, 126, 234, 0.3);
  border-top-color: #667eea;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* Error message */
.error-message {
  background: rgba(239, 68, 68, 0.2);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(239, 68, 68, 0.5);
  border-radius: 16px;
  padding: 12px 16px;
  margin-top: 20px;
  display: none;
  align-items: center;
  gap: 10px;
  color: #fee2e2;
  font-size: 13px;
  animation: shake 0.5s ease;
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-5px); }
  75% { transform: translateX(5px); }
}

.error-message ion-icon {
  font-size: 20px;
  flex-shrink: 0;
}

/* Footer links */
.footer-links {
  display: flex;
  justify-content: space-between;
  margin-top: 24px;
  padding-top: 24px;
  border-top: 1px solid rgba(255, 255, 255, 0.2);
}

.footer-link {
  color: rgba(255, 255, 255, 0.7);
  text-decoration: none;
  font-size: 13px;
  transition: all 0.3s ease;
  display: flex;
  align-items: center;
  gap: 6px;
}

.footer-link:hover {
  color: white;
  transform: translateY(-1px);
}

/* Glassmorphism stat cards (for dashboard reference) */
.stats-preview {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  margin-top: 32px;
}

.stat-preview-card {
  background: rgba(255, 255, 255, 0.1);
  backdrop-filter: blur(10px);
  border-radius: 16px;
  padding: 12px;
  border: 1px solid rgba(255, 255, 255, 0.2);
  transition: all 0.3s ease;
}

.stat-preview-card:hover {
  background: rgba(255, 255, 255, 0.15);
  transform: translateY(-2px);
}

.stat-preview-card ion-icon {
  font-size: 20px;
  color: rgba(255, 255, 255, 0.9);
  margin-bottom: 6px;
}

.stat-preview-card .stat-label {
  font-size: 10px;
  color: rgba(255, 255, 255, 0.7);
  margin-bottom: 4px;
}

.stat-preview-card .stat-value {
  font-size: 16px;
  font-weight: 700;
  color: white;
}

/* Responsive */
@media (max-width: 480px) {
  .glass-card {
    padding: 32px 24px;
  }
  
  .logo-icon {
    width: 60px;
    height: 60px;
  }
  
  .logo-icon img {
    width: 38px;
    height: 38px;
  }
  
  .logo-section h1 {
    font-size: 24px;
  }
  
  .stats-preview {
    grid-template-columns: 1fr;
  }
}
</style>
</head>
<body>

<div id="particles"></div>

<div class="glass-card">
  <div class="logo-section">
    <div class="logo-icon">
      <img src="https://i.postimg.cc/dQjyw0ZV/atlas.png" alt="Atlas logo">
    </div>
    <h1>Welcome Back</h1>
    <p>Login to access the admin dashboard</p>
  </div>

  <form id="loginForm">
    <div class="form-group">
      <div class="input-wrapper">
        <ion-icon name="mail-outline" class="input-icon"></ion-icon>
        <input type="email" id="email" class="input-field" placeholder="admin@atlas.com">
      </div>
    </div>

    <div class="form-group">
      <div class="input-wrapper">
        <ion-icon name="lock-closed-outline" class="input-icon"></ion-icon>
        <input type="password" id="password" class="input-field" placeholder="Enter admin password">
        <button type="button" class="toggle-password" onclick="togglePassword()">
          <ion-icon name="eye-outline" id="toggleIcon"></ion-icon>
        </button>
      </div>
    </div>

    <button type="submit" class="login-btn" id="submitBtn">
      <ion-icon name="log-in-outline"></ion-icon>
      <span>Login to Dashboard</span>
    </button>

    <div id="errorMessage" class="error-message">
      <ion-icon name="alert-circle-outline"></ion-icon>
      <span id="errorText"></span>
    </div>
  </form>

  <div class="footer-links">
    <a href="/" class="footer-link">
      <ion-icon name="arrow-back-outline"></ion-icon>
      Back to Home
    </a>
    <a href="#" class="footer-link">
      <ion-icon name="help-circle-outline"></ion-icon>
      Need Help?
    </a>
  </div>

  <!-- Preview stats (optional) -->
  <div class="stats-preview">
    <div class="stat-preview-card">
      <ion-icon name="people-outline"></ion-icon>
      <div class="stat-label">Walooshwa so far 
😂</div>
      <div class="stat-value">10,000+</div>
    </div>
    <div class="stat-preview-card">
      <ion-icon name="shield-checkmark-outline"></ion-icon>
      <div class="stat-label">Kumamamake 🤣 </div>
      <div class="stat-value">sana shamba
😂
</div>
    </div>
  </div>
</div>

<script>
  // Create floating particles
  function createParticles() {
    const particlesContainer = document.getElementById('particles');
    for (let i = 0; i < 50; i++) {
      const particle = document.createElement('div');
      particle.className = 'particle';
      particle.style.left = Math.random() * 100 + '%';
      particle.style.animationDelay = Math.random() * 20 + 's';
      particle.style.animationDuration = 10 + Math.random() * 20 + 's';
      particle.style.width = Math.random() * 3 + 2 + 'px';
      particle.style.height = particle.style.width;
      particlesContainer.appendChild(particle);
    }
  }
  createParticles();

  // Toggle password visibility
  function togglePassword() {
    const passwordInput = document.getElementById('password');
    const toggleIcon = document.getElementById('toggleIcon');
    if (passwordInput.type === 'password') {
      passwordInput.type = 'text';
      toggleIcon.setAttribute('name', 'eye-off-outline');
    } else {
      passwordInput.type = 'password';
      toggleIcon.setAttribute('name', 'eye-outline');
    }
  }

  // Form submission
  const form = document.getElementById('loginForm');
  const emailInput = document.getElementById('email');
  const passwordInput = document.getElementById('password');
  const submitBtn = document.getElementById('submitBtn');
  const errorDiv = document.getElementById('errorMessage');
  const errorText = document.getElementById('errorText');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const email = emailInput.value.trim();
    const password = passwordInput.value;
    
    if (!email || !password) {
      errorText.textContent = 'Email and password are required';
      errorDiv.style.display = 'flex';
      setTimeout(() => {
        errorDiv.style.display = 'none';
      }, 3000);
      return;
    }

    submitBtn.disabled = true;
    submitBtn.innerHTML = '<span class="button-loading"><span class="spinner"></span> Logging in...</span>';
    errorDiv.style.display = 'none';

    try {
      const response = await fetch('/api/admin/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });

      const data = await response.json();

      if (response.ok && data.token) {
        localStorage.setItem('adminToken', data.token);
        // Add success animation
        submitBtn.innerHTML = '<ion-icon name="checkmark-circle-outline"></ion-icon> Success! Redirecting...';
        submitBtn.style.background = 'rgba(16, 185, 129, 0.9)';
        setTimeout(() => {
          window.location.href = '/admin/dashboard';
        }, 1000);
      } else {
        errorText.textContent = data.detail || 'Invalid email or password';
        errorDiv.style.display = 'flex';
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<ion-icon name="log-in-outline"></ion-icon> Login to Dashboard';
        submitBtn.style.background = '';
        
        // Shake animation
        const card = document.querySelector('.glass-card');
        card.style.animation = 'shake 0.5s ease';
        setTimeout(() => {
          card.style.animation = '';
        }, 500);
        
        setTimeout(() => {
          errorDiv.style.display = 'none';
        }, 3000);
      }
    } catch (error) {
      errorText.textContent = 'Network error. Please try again.';
      errorDiv.style.display = 'flex';
      submitBtn.disabled = false;
      submitBtn.innerHTML = '<ion-icon name="log-in-outline"></ion-icon> Login to Dashboard';
      setTimeout(() => {
        errorDiv.style.display = 'none';
      }, 3000);
    }
  });

  // Add input animations
  const inputs = document.querySelectorAll('.input-field');
  inputs.forEach(input => {
    input.addEventListener('focus', () => {
      input.parentElement.style.transform = 'scale(1.02)';
    });
    input.addEventListener('blur', () => {
      input.parentElement.style.transform = 'scale(1)';
    });
  });
</script>

</body>
</html>
