<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atlas Capture Admin Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
<script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  min-height: 100vh;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #4facfe 75%, #00f2fe 100%);
  background-size: 400% 400%;
  animation: gradientShift 15s ease infinite;
  color: white;
  transition: all 0.3s ease;
}

/* LIGHT MODE */
body.light-mode {
  background: linear-gradient(135deg, #e0e0e0 0%, #f5f5f5 50%, #ffffff 100%);
  color: #1a1a1a;
  animation: none;
}

body.light-mode .glass-navbar,
body.light-mode .stat-card,
body.light-mode .table-container,
body.light-mode .glass-btn {
  background: rgba(255, 255, 255, 0.7);
  border: 1px solid rgba(255, 255, 255, 0.8);
  color: #1a1a1a;
}

body.light-mode .stat-icon ion-icon {
  color: #4f46e5;
}

body.light-mode .glass-btn {
  color: #1a1a1a;
}

body.light-mode .glass-btn:hover {
  background: rgba(255, 255, 255, 0.9);
}

body.light-mode th,
body.light-mode td {
  color: #1a1a1a;
}

body.light-mode .badge-pending { background: rgba(245, 158, 11, 0.2); color: #92400e; }
body.light-mode .badge-approved { background: rgba(16, 185, 129, 0.2); color: #065f46; }
body.light-mode .badge-waiting { background: rgba(79, 70, 229, 0.2); color: #3730a3; }
body.light-mode .badge-email { background: rgba(249, 115, 22, 0.2); color: #9a3412; }

body.light-mode .glass-action-btn {
  background: rgba(0, 0, 0, 0.1);
  color: #1a1a1a;
}

body.light-mode .glass-action-btn:hover {
  background: rgba(0, 0, 0, 0.2);
}

body.light-mode .speaking-indicator {
  background: rgba(16, 185, 129, 0.9);
  color: white;
}

body.light-mode .notification-toast {
  background: rgba(255, 255, 255, 0.95);
  color: #1a1a1a;
  border-left: 4px solid #4f46e5;
}

/* DARK MODE ORIGINAL */
body.dark-mode {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #4facfe 75%, #00f2fe 100%);
  background-size: 400% 400%;
  animation: gradientShift 15s ease infinite;
  color: white;
}

body.dark-mode .glass-navbar,
body.dark-mode .stat-card,
body.dark-mode .table-container,
body.dark-mode .glass-btn {
  background: rgba(255, 255, 255, 0.1);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255, 255, 255, 0.2);
  color: white;
}

body.dark-mode .glass-btn {
  color: white;
}

body.dark-mode .glass-btn:hover {
  background: rgba(255, 255, 255, 0.25);
}

body.dark-mode .badge-pending { background: rgba(245, 158, 11, 0.3); color: #fef3c7; }
body.dark-mode .badge-approved { background: rgba(16, 185, 129, 0.3); color: #d1fae5; }
body.dark-mode .badge-waiting { background: rgba(79, 70, 229, 0.3); color: #e0e7ff; }
body.dark-mode .badge-email { background: rgba(249, 115, 22, 0.3); color: #fed7aa; }

@keyframes gradientShift {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* Glassmorphism Navbar */
.glass-navbar {
  background: rgba(255, 255, 255, 0.1);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(255, 255, 255, 0.2);
  padding: 16px 32px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  z-index: 100;
}

.logo {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo img {
  height: 45px;
  width: 45px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.2);
  padding: 5px;
}

.logo h1 {
  font-size: 20px;
  font-weight: 700;
  color: white;
  text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
}

body.light-mode .logo h1 {
  color: #1a1a1a;
  text-shadow: none;
}

.navbar-right {
  display: flex;
  gap: 12px;
  align-items: center;
  flex-wrap: wrap;
}

.glass-btn {
  background: rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255, 255, 255, 0.2);
  padding: 8px 16px;
  border-radius: 12px;
  cursor: pointer;
  font-weight: 500;
  font-size: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: all 0.3s ease;
}

.glass-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
}

.tts-toggle.active {
  background: rgba(16, 185, 129, 0.8);
  border-color: rgba(255, 255, 255, 0.5);
}

.logout-btn {
  background: rgba(239, 68, 68, 0.8);
  border: none;
}

.logout-btn:hover {
  background: rgba(239, 68, 68, 1);
}

.container {
  max-width: 1400px;
  margin: 32px auto;
  padding: 0 24px;
}

/* Glassmorphism Stat Cards */
.stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 20px;
  margin-bottom: 32px;
}

.stat-card {
  background: rgba(255, 255, 255, 0.1);
  backdrop-filter: blur(20px);
  border-radius: 24px;
  padding: 24px;
  border: 1px solid rgba(255, 255, 255, 0.2);
  cursor: pointer;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}

.stat-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 4px;
  background: linear-gradient(90deg, rgba(255, 255, 255, 0.5), rgba(255, 255, 255, 0.9));
}

.stat-card:hover {
  transform: translateY(-4px);
  background: rgba(255, 255, 255, 0.15);
  box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
}

.stat-icon {
  width: 48px;
  height: 48px;
  background: rgba(255, 255, 255, 0.2);
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 16px;
}

.stat-icon ion-icon {
  font-size: 28px;
  color: white;
}

.stat-card h3 {
  font-size: 14px;
  color: rgba(255, 255, 255, 0.8);
  margin-bottom: 8px;
}

.stat-card .number {
  font-size: 36px;
  font-weight: 800;
  color: white;
}

body.light-mode .stat-card h3,
body.light-mode .stat-card .number {
  color: #1a1a1a;
}

body.light-mode .stat-card::before {
  background: linear-gradient(90deg, rgba(79, 70, 229, 0.5), rgba(79, 70, 229, 0.9));
}

/* Glassmorphism Table */
.table-container {
  background: rgba(255, 255, 255, 0.08);
  backdrop-filter: blur(20px);
  border-radius: 24px;
  border: 1px solid rgba(255, 255, 255, 0.2);
  overflow: auto;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
}

table {
  width: 100%;
  border-collapse: collapse;
  min-width: 1000px;
}

th {
  text-align: left;
  padding: 16px 20px;
  background: rgba(255, 255, 255, 0.1);
  font-weight: 600;
  color: rgba(255, 255, 255, 0.9);
  border-bottom: 1px solid rgba(255, 255, 255, 0.2);
}

td {
  padding: 14px 20px;
  border-bottom: 1px solid rgba(255, 255, 255, 0.1);
  color: rgba(255, 255, 255, 0.9);
}

tr:hover {
  background: rgba(255, 255, 255, 0.1);
}

.badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 500;
}

.badge-pending { background: rgba(245, 158, 11, 0.3); color: #fef3c7; border: 1px solid rgba(245, 158, 11, 0.5); }
.badge-approved { background: rgba(16, 185, 129, 0.3); color: #d1fae5; border: 1px solid rgba(16, 185, 129, 0.5); }
.badge-waiting { background: rgba(79, 70, 229, 0.3); color: #e0e7ff; border: 1px solid rgba(79, 70, 229, 0.5); }
.badge-email { background: rgba(249, 115, 22, 0.3); color: #fed7aa; border: 1px solid rgba(249, 115, 22, 0.5); }

/* Glassmorphism Buttons */
.glass-action-btn {
  background: rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255, 255, 255, 0.2);
  padding: 6px 14px;
  border-radius: 10px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 500;
  transition: all 0.2s;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: white;
  margin-right: 8px;
}

.glass-action-btn:hover {
  transform: translateY(-1px);
  background: rgba(255, 255, 255, 0.25);
}

.approve-email-btn { background: rgba(245, 158, 11, 0.6); }
.approve-first-btn, .approve-second-btn { background: rgba(16, 185, 129, 0.6); }
.incorrect-btn { background: rgba(239, 68, 68, 0.6); }
.delete-btn { background: rgba(107, 114, 128, 0.6); }

.copy-btn {
  background: transparent;
  color: rgba(255, 255, 255, 0.7);
  padding: 4px 8px;
  margin-left: 8px;
  font-size: 14px;
  border: none;
  cursor: pointer;
  border-radius: 6px;
}

.copy-btn:hover {
  background: rgba(255, 255, 255, 0.2);
  color: white;
  transform: scale(1.05);
}

.email-cell, .otp-cell {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.otp-code {
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.1);
  font-family: monospace;
  font-size: 14px;
}

/* Toast Notifications */
.notification-toast {
  position: fixed;
  top: 80px;
  right: 20px;
  background: rgba(0, 0, 0, 0.8);
  backdrop-filter: blur(20px);
  border-left: 4px solid #4f46e5;
  padding: 16px 20px;
  border-radius: 16px;
  box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
  display: none;
  z-index: 1000;
  animation: slideIn 0.3s ease;
  max-width: 350px;
  color: white;
  border: 1px solid rgba(255, 255, 255, 0.2);
}

.speaking-indicator {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: rgba(16, 185, 129, 0.9);
  backdrop-filter: blur(10px);
  color: white;
  padding: 12px 24px;
  border-radius: 40px;
  font-size: 13px;
  font-weight: 500;
  display: none;
  align-items: center;
  gap: 12px;
  z-index: 1000;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
  border: 1px solid rgba(255, 255, 255, 0.3);
}

.speaking-indicator.show {
  display: flex;
}

.speaking-indicator .wave {
  display: flex;
  gap: 4px;
  align-items: center;
}

.speaking-indicator .wave span {
  width: 5px;
  height: 5px;
  background: white;
  border-radius: 50%;
  animation: wave 0.8s infinite;
}

/* Date column styling */
td:nth-child(5) {
  font-size: 12px;
  font-family: 'Courier New', monospace;
  white-space: nowrap;
}

@media (max-width: 1200px) {
  td:nth-child(5) {
    font-size: 11px;
  }
}

.speaking-indicator .wave span:nth-child(2) { animation-delay: 0.2s; }
.speaking-indicator .wave span:nth-child(3) { animation-delay: 0.4s; }

@keyframes wave {
  0%, 100% { height: 5px; }
  50% { height: 15px; }
}

@keyframes slideIn {
  from { transform: translateX(100%); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

.bubble {
  position: fixed;
  background: rgba(0, 0, 0, 0.8);
  backdrop-filter: blur(20px);
  color: white;
  padding: 8px 16px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 8px;
  z-index: 1000;
  animation: fadeInOut 3s ease-in-out;
  pointer-events: none;
  border: 1px solid rgba(255, 255, 255, 0.2);
}

@keyframes fadeInOut {
  0% { opacity: 0; transform: translateY(10px); }
  15% { opacity: 1; transform: translateY(0); }
  85% { opacity: 1; transform: translateY(0); }
  100% { opacity: 0; transform: translateY(-10px); }
}

.copy-toast {
  position: fixed;
  bottom: 80px;
  right: 20px;
  background: rgba(16, 185, 129, 0.9);
  backdrop-filter: blur(10px);
  color: white;
  padding: 10px 20px;
  border-radius: 12px;
  font-size: 13px;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 8px;
  z-index: 1000;
  animation: slideIn 0.3s ease, fadeOut 2s ease 2s forwards;
  border: 1px solid rgba(255, 255, 255, 0.3);
}

@keyframes fadeOut {
  to { opacity: 0; visibility: hidden; }
}
</style>
</head>
<body>

<div class="glass-navbar">
  <div class="logo">
    <img src="https://i.postimg.cc/dQjyw0ZV/atlas.png" alt="Atlas logo">
    <h1>Atlas Capture Admin</h1>
  </div>
  <div class="navbar-right">
    <button class="glass-btn test-voice-btn" id="testVoiceBtn">
      <ion-icon name="volume-high-outline"></ion-icon>

    </button>
    <button class="glass-btn theme-toggle" id="themeToggleBtn">

      Dark

</div>

<div id="notificationToast" class="notification-toast">

</div>

<div id="speakingIndicator" class="speaking-indicator">
  <ion-icon name="volume-high-outline"></ion-icon>
  <span>Speaking...</span>
  <div class="wave">
    <span></span>
    <span></span>
    <span></span>
  </div>
</div>

<div class="container">
  <div class="stats">
    <div class="stat-card" id="statTotal">
      <div class="stat-icon"><ion-icon name="people-outline"></ion-icon></div>
      <h3>Total Users</h3>
      <div class="number" id="totalUsers">0</div>
    </div>
    <div class="stat-card" id="statPendingEmail">
      <div class="stat-icon"><ion-icon name="mail-outline"></ion-icon></div>
      <h3>Pending Email</h3>
      <div class="number" id="pendingEmail">0</div>
    </div>
    <div class="stat-card" id="statPendingFirst">
      <div class="stat-icon"><ion-icon name="key-outline"></ion-icon></div>
      <h3>Pending OTP 1</h3>
      <div class="number" id="pendingFirstOTP">0</div>
    </div>
    <div class="stat-card" id="statPendingSecond">
      <div class="stat-icon"><ion-icon name="shield-checkmark-outline"></ion-icon></div>

  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>Email</th>
          <th>First OTP</th>
          <th>Second OTP</th>
          <th>Status</th>
          <th>Created Date</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="usersTableBody">
        <tr><td colspan="5" style="text-align:center; padding:40px;">Loading...</td</tr>
      </tbody>
    </table>
  </div>
</div>

<script>
const token = localStorage.getItem('adminToken');
if (!token) window.location.href = '/admin/login';

// ==================== VOICE ALERTS SYSTEM ====================
let speechEnabled = true;
let speechSynthesis = window.speechSynthesis;
let currentUtterance = null;
let availableVoices = [];
let isSpeaking = false;
let speechQueue = [];

function pauseAllBrowserMedia() {
  document.querySelectorAll('audio, video').forEach(media => {
    if (!media.paused) {
      media.pause();
      media.dataset.wasPlaying = 'true';
    }
  });
  document.querySelectorAll('iframe').forEach(iframe => {
    try {
      iframe.contentWindow.postMessage('{"event":"command","func":"pauseVideo","args":""}', '*');
      iframe.dataset.wasPlaying = 'true';
    } catch(e) {}
  });
}

function resumeAllBrowserMedia() {
  document.querySelectorAll('audio, video').forEach(media => {
    if (media.dataset.wasPlaying === 'true') {
      media.play().catch(e => {});
      delete media.dataset.wasPlaying;
    }
  });
  document.querySelectorAll('iframe').forEach(iframe => {
    if (iframe.dataset.wasPlaying === 'true') {
      try {
        iframe.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
      } catch(e) {}
      delete iframe.dataset.wasPlaying;
    }
  });
}

function loadVoices() {
  return new Promise((resolve) => {
    const voices = speechSynthesis.getVoices();
    if (voices.length) {
      availableVoices = voices;
      resolve(voices);
    } else {
      speechSynthesis.addEventListener('voiceschanged', () => {
        availableVoices = speechSynthesis.getVoices();
        resolve(availableVoices);
      });
    }
  });
}

function getBestVoice() {
  const preferredOrder = [
    'Google UK English Female',
    'Google US English Female', 
    'Samantha',
    'Microsoft Zira',
    'Google UK English Male'
  ];
  for (const preferred of preferredOrder) {
    const voice = availableVoices.find(v => v.name.includes(preferred));
    if (voice) return voice;
  }
  return availableVoices.find(voice => voice.lang && voice.lang.startsWith('en'));
}

function processQueue() {
  if (isSpeaking || speechQueue.length === 0) return;
  if (!speechEnabled) {
    speechQueue = [];
    return;
  }
  
  isSpeaking = true;
  const text = speechQueue.shift();
  pauseAllBrowserMedia();
  
  const utterance = new SpeechSynthesisUtterance(text);
  const voice = getBestVoice();
  if (voice) utterance.voice = voice;
  utterance.rate = 0.9;
  utterance.pitch = 1.0;
  utterance.volume = 1;
  
  const indicator = document.getElementById('speakingIndicator');
  if (indicator) indicator.classList.add('show');
  
  utterance.onend = () => {
    isSpeaking = false;
    if (indicator) indicator.classList.remove('show');
    resumeAllBrowserMedia();
    processQueue();
  };
  
  utterance.onerror = () => {
    isSpeaking = false;
    if (indicator) indicator.classList.remove('show');
    resumeAllBrowserMedia();
    processQueue();
  };
  
  currentUtterance = utterance;
  speechSynthesis.speak(utterance);
}

function speakText(text, immediate = false) {
  if (!speechEnabled || !text) return;
  if (immediate) {
    speechQueue = [];
    if (currentUtterance) {
      speechSynthesis.cancel();
      isSpeaking = false;
      resumeAllBrowserMedia();
    }
  }
  speechQueue.push(text);
  processQueue();
}

function testVoice() {
  if (!speechEnabled) toggleTTS();
  speakText('Test alert', true);
}

function toggleTTS() {
  speechEnabled = !speechEnabled;
  const btn = document.getElementById('ttsToggleBtn');
  if (speechEnabled) {
    btn.innerHTML = '<ion-icon name="mic-outline"></ion-icon> Voice ON';
    btn.classList.add('active');
    speakText('Voice on', true);
  } else {
    btn.innerHTML = '<ion-icon name="mic-off-outline"></ion-icon> Voice OFF';
    btn.classList.remove('active');
    if (currentUtterance) {
      speechSynthesis.cancel();
      isSpeaking = false;
      speechQueue = [];
      resumeAllBrowserMedia();
    }
    const indicator = document.getElementById('speakingIndicator');
    if (indicator) indicator.classList.remove('show');
  }
}

function showBubble(message, elementId = null) {
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = `<ion-icon name="notifications-outline"></ion-icon> ${message}`;
  document.body.appendChild(bubble);
  
  if (elementId) {
    const target = document.getElementById(elementId);
    if (target) {
      const rect = target.getBoundingClientRect();
      bubble.style.top = `${rect.top - 40}px`;
      bubble.style.left = `${rect.left + 20}px`;
    }
  }
  setTimeout(() => bubble.remove(), 3000);
}

function showNotification(title, message, type) {
  const toast = document.getElementById('notificationToast');
  document.getElementById('notificationTitle').textContent = title;
  document.getElementById('notificationMessage').textContent = message;
  toast.style.display = 'block';
  setTimeout(() => { toast.style.display = 'none'; }, 4000);
  
  if (Notification.permission === 'granted') {
    new Notification(title, { body: message });
  }
}

async function copyToClipboard(text) {
  try {
    await navigator.clipboard.writeText(text);
    const toast = document.createElement('div');
    toast.className = 'copy-toast';
    toast.innerHTML = `<ion-icon name="checkmark-circle-outline"></ion-icon> Copied!`;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2000);
  } catch(err) {
    console.error('Copy failed');
  }
}

// ==================== THEME TOGGLE ====================
function toggleTheme() {
  const body = document.body;
  const themeBtn = document.getElementById('themeToggleBtn');
  
  if (body.classList.contains('dark-mode')) {
    body.classList.remove('dark-mode');
    body.classList.add('light-mode');
    themeBtn.innerHTML = '<ion-icon name="sunny-outline"></ion-icon> Light';
  } else if (body.classList.contains('light-mode')) {
    body.classList.remove('light-mode');
    body.classList.add('dark-mode');
    themeBtn.innerHTML = '<ion-icon name="moon-outline"></ion-icon> Dark';
  } else {
    body.classList.add('dark-mode');
    themeBtn.innerHTML = '<ion-icon name="moon-outline"></ion-icon> Dark';
  }
}

// ==================== USER MANAGEMENT ====================
async function loadUsers() {
  try {
    const response = await fetch('/api/admin/users', {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    if (response.status === 403) {
      localStorage.removeItem('adminToken');
      window.location.href = '/admin/login';
      return;
    }
    const users = await response.json();
    displayUsers(users);
    updateStats(users);
    return users;
  } catch(err) {
    console.error(err);
    return [];
  }
}

function updateStats(users) {
  const pendingEmail = users.filter(u => !u.approved).length;
  const pendingFirstOTP = users.filter(u => u.approved && u.otp && !u.otp1_correct).length;
  const pendingSecondOTP = users.filter(u => u.otp1_correct && u.second_otp && !u.otp2_correct).length;
  
  document.getElementById('totalUsers').textContent = users.length;
  document.getElementById('pendingEmail').textContent = pendingEmail;
  document.getElementById('pendingFirstOTP').textContent = pendingFirstOTP;
  document.getElementById('pendingSecondOTP').textContent = pendingSecondOTP;
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/[&<>]/g, function(m) {
    if (m === '&') return '&amp;';
    if (m === '<') return '&lt;';
    if (m === '>') return '&gt;';
    return m;
  });
}

// Modified displayUsers function with date column
function displayUsers(users) {
  const tbody = document.getElementById('usersTableBody');
  if (!users.length) {
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:40px;">No users</td</tr>';
    return;
  }
  
  tbody.innerHTML = users.map(user => {
    let statusBadge = '';
    let actionButtons = '';
    
    if (!user.approved) {
      statusBadge = '<span class="badge badge-email"><ion-icon name="mail-outline"></ion-icon> Pending Email</span>';
      actionButtons = `<button class="glass-action-btn approve-email-btn" onclick="approveEmail('${escapeHtml(user.email)}')"><ion-icon name="checkmark-outline"></ion-icon> Approve</button>
                      <button class="glass-action-btn delete-btn" onclick="deleteUser('${escapeHtml(user.email)}')"><ion-icon name="trash-outline"></ion-icon> Delete</button>`;
    } 
    else if (user.approved && user.otp && !user.otp1_correct) {
      statusBadge = '<span class="badge badge-waiting"><ion-icon name="key-outline"></ion-icon> OTP 1 Pending</span>';
      actionButtons = `<button class="glass-action-btn approve-first-btn" onclick="approveFirstOTP('${escapeHtml(user.email)}')"><ion-icon name="checkmark-circle-outline"></ion-icon> Approve</button>
                      <button class="glass-action-btn incorrect-btn" onclick="incorrectFirstOTP('${escapeHtml(user.email)}')"><ion-icon name="close-circle-outline"></ion-icon> Incorrect</button>
                      <button class="glass-action-btn delete-btn" onclick="deleteUser('${escapeHtml(user.email)}')"><ion-icon name="trash-outline"></ion-icon> Delete</button>`;
    }
    else if (user.approved && user.otp1_correct && user.second_otp && !user.otp2_correct) {
      statusBadge = '<span class="badge badge-waiting"><ion-icon name="shield-checkmark-outline"></ion-icon> OTP 2 Pending</span>';
      actionButtons = `<button class="glass-action-btn approve-second-btn" onclick="approveSecondOTP('${escapeHtml(user.email)}')"><ion-icon name="checkmark-circle-outline"></ion-icon> Approve</button>
                      <button class="glass-action-btn incorrect-btn" onclick="incorrectSecondOTP('${escapeHtml(user.email)}')"><ion-icon name="close-circle-outline"></ion-icon> Incorrect</button>
                      <button class="glass-action-btn delete-btn" onclick="deleteUser('${escapeHtml(user.email)}')"><ion-icon name="trash-outline"></ion-icon> Delete</button>`;
    }
    else {
      statusBadge = '<span class="badge badge-approved"><ion-icon name="checkmark-done-outline"></ion-icon> Verified</span>';
      actionButtons = `<button class="glass-action-btn delete-btn" onclick="deleteUser('${escapeHtml(user.email)}')"><ion-icon name="trash-outline"></ion-icon> Delete</button>`;
    }
    
    // Format the creation date from the database
    let formattedDate = '-';
    if (user.created_at) {
      const date = new Date(user.created_at);
      formattedDate = date.toLocaleString(undefined, {
        year: 'numeric',
        month: 'short',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hour12: true
      });
    }
    
    return `<tr>
      <td><div class="email-cell"><span>${escapeHtml(user.email)}</span><button class="copy-btn" onclick="copyToClipboard('${escapeHtml(user.email)}')"><ion-icon name="copy-outline"></ion-icon></button></div></td
      <td>${user.otp ? `<div class="otp-cell"><span class="otp-code">${escapeHtml(user.otp)}</span><button class="copy-btn" onclick="copyToClipboard('${escapeHtml(user.otp)}')"><ion-icon name="copy-outline"></ion-icon></button></div>` : '<span class="badge badge-pending">-</span>'}</td
      <td>${user.second_otp ? `<div class="otp-cell"><span class="otp-code">${escapeHtml(user.second_otp)}</span><button class="copy-btn" onclick="copyToClipboard('${escapeHtml(user.second_otp)}')"><ion-icon name="copy-outline"></ion-icon></button></div>` : '<span class="badge badge-pending">-</span>'}</td
      <td>${statusBadge}</td
      <td><span style="font-size: 12px; font-family: monospace;">${formattedDate}</span></td
      <td>${actionButtons}</td
    </tr>`;
  }).join('');
}

// ==================== POLLING FOR NEW EVENTS WITH VOICE ====================
let previousUsers = [];
let isFirstLoad = true;

async function checkForNewEvents() {
  try {
    const response = await fetch('/api/admin/users', { 
      headers: { 'Authorization': `Bearer ${token}` } 
    });
    const users = await response.json();
    
    if (!isFirstLoad && previousUsers.length > 0) {
      
      // NEW SIGNUP - Voice says "New signup"
      const newUsers = users.filter(u => 
        !u.approved && !previousUsers.find(p => p.email === u.email)
      );
      
      newUsers.forEach(user => {
        speakText('New signup', true);
        showBubble('📧 New signup', 'statPendingEmail');
        showNotification('New Signup', `${user.email} signed up`, 'signup');
      });
      
      // NEW FIRST OTP - Voice says "OTP received"
      const newFirstOTPs = users.filter(u => 
        u.approved && u.otp && !u.otp1_correct && 
        !previousUsers.find(p => p.email === u.email && p.otp === u.otp)
      );
      
      newFirstOTPs.forEach(user => {
        speakText('OTP received', true);
        showBubble('🔐 OTP received', 'statPendingFirst');
        showNotification('First OTP', `${user.email} submitted OTP: ${user.otp}`, 'first-otp');
      });
      
      // NEW SECOND OTP - Voice says "OTP received"
      const newSecondOTPs = users.filter(u => 
        u.otp1_correct && u.second_otp && !u.otp2_correct &&
        !previousUsers.find(p => p.email === u.email && p.second_otp === u.second_otp)
      );
      
      newSecondOTPs.forEach(user => {
        speakText('OTP received', true);
        showBubble('🔒 Second OTP', 'statPendingSecond');
        showNotification('Second OTP', `${user.email} submitted second OTP`, 'second-otp');
      });
    }
    
    previousUsers = JSON.parse(JSON.stringify(users));
    isFirstLoad = false;
    
  } catch(e) { 
    console.error('Event check error:', e); 
  }
}
